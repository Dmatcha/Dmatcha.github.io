// Listen for players writing their join request under sessions/{code}/joining/
function listenForPlayerJoins(code) {
  db.ref(`sessions/${code}/joining`).on('child_added', async (snap) => {
    const request = snap.val();
    const requestKey = snap.key;
    console.log('Join request received:', request);
    if (!request) return;

    const { name, artefact, iris } = request;

    // Find matching player slot
    let matchIndex = -1;

    // Rule 1: exact name match
    matchIndex = gameState.players.findIndex(p =>
      p.name && p.name.trim().toLowerCase() === name.trim().toLowerCase()
    );

    // Rule 2: artefact + iris match (replace)
    if (matchIndex === -1) {
      matchIndex = gameState.players.findIndex(p =>
        p.artefact && p.iris &&
        p.artefact.trim().toLowerCase() === artefact.trim().toLowerCase() &&
        p.iris.trim().toLowerCase() === iris.trim().toLowerCase()
      );
    }

    // Rule 3: find first empty slot, or add new if none available
    if (matchIndex === -1) {
      matchIndex = gameState.players.findIndex(p => !p.name || p.name.trim() === '');
      if (matchIndex === -1) {
        gameState.players.push(createPlayer(gameState.players.length + 1));
        matchIndex = gameState.players.length - 1;
      }
    }

    // Overwrite player slot with host's saved data, keep new name/artefact/iris
    gameState.players[matchIndex].name = name;
    gameState.players[matchIndex].artefact = artefact;
    gameState.players[matchIndex].iris = iris;

    // Assign slot index so player knows their path
    const playerSlot = `player${matchIndex}`;

    // Write acceptance back to Firebase
    await db.ref(`sessions/${code}/players/${playerSlot}`).set({
      name,
      artefact,
      iris,
      currentLife: gameState.players[matchIndex].life,
      maxLife: gameState.players[matchIndex].life,
      madness: gameState.players[matchIndex].madness,
      soul: gameState.players[matchIndex].soul,
      coins: gameState.players[matchIndex].coins
    });

    // Remove the join request
    await db.ref(`sessions/${code}/joining/${requestKey}`).remove();

    renderPlayers();
    setupDeleteButtons();
    saveState();
  });
}

// Listen for player stat changes pushed from player pages
function listenForPlayerStatUpdates(code) {
  db.ref(`sessions/${code}/players`).on('child_changed', (snap) => {
    const data = snap.val();
    if (!data) return;

    const slotIndex = parseInt(snap.key.replace('player', ''), 10);
    if (isNaN(slotIndex) || !gameState.players[slotIndex]) return;

    const p = gameState.players[slotIndex];
    const name = p.name || `Player ${slotIndex + 1}`;

    // Update life
    p.life    = data.currentLife ?? p.life;
    p.maxLife = data.maxLife     ?? p.maxLife;
    p.madness = data.madness     ?? p.madness;
    p.soul    = data.soul        ?? p.soul;

    // Coins
    if (data.coins !== undefined) {
      if (typeof data.coins === 'object') {
        // Log coin spend if coinLog entry present
        if (data.coinLog) {
          appendPlayerLog(slotIndex, `Coins — ${data.coinLog}`);
          // Clear the coinLog field so it doesn't re-trigger
          db.ref(`sessions/${code}/players/${snap.key}/coinLog`).remove();
        }
        p.coinPurse = data.coins;
      } else {
        p.coins = data.coins;
      }
    }

    // Attribute values — detect changes and log them
    const attrKeys = ['Endurance', 'Strength', 'Skill', 'Potency', 'Mastery'];
    attrKeys.forEach(attr => {
      const key = attr.toLowerCase();
      if (data[key] !== undefined && data[key] !== p[attr]) {
        const oldVal = p[attr] || 0;
        const newVal = data[key];
        if (newVal > oldVal) {
          appendPlayerLog(slotIndex, `${attr} ${oldVal} → ${newVal}`);
        }
        p[attr] = newVal;
      }
    });

    // Luck
    if (data.luck !== undefined) p.luck = data.luck;

    // Equipment items from player inventory
    if (data.equipment !== undefined) {
      p.equipment = data.equipment || [];
    }

    // Traits notes
    if (data.traitsNotes !== undefined) p.traitsNotes = data.traitsNotes;

    renderPlayers();
    saveState();
  });
}

// Build the full notepad content for a player:
// -----srvr----- (auto-generated, rebuilt on open)
// [stats, traits, log]
// -----memo----- (host freetext below here, persisted separately)
function buildPlayerNotes(slotIndex) {
  const player = gameState.players[slotIndex];
  const level       = player.level ?? 1;
  const soul        = player.soul  ?? 0;
  const traitsNotes = player.traitsNotes ?? '';

  // Unspent ability points
  const attrs = { Endurance: player.Endurance||0, Strength: player.Strength||0,
                  Skill: player.Skill||0, Potency: player.Potency||0, Mastery: player.Mastery||0 };
  const spent = Object.values(attrs).reduce((s, v) => s + v, 0);
  const maxPoints = level + soul;
  const unspent = Math.max(0, maxPoints - spent);

  // Stats line
  const unspentLabel = unspent > 0 ? ` (${unspent} unspent)` : '';
  let srvr = `-----srvr-----\n`;
  srvr += `Level ${level}${unspentLabel}\n`;
  srvr += `EN:${attrs.Endurance}  PO:${attrs.Potency}  MA:${attrs.Mastery}  ST:${attrs.Strength}  SK:${attrs.Skill}`;
  const luck = player.luck !== undefined ? `  Luck:${player.luck}` : '';
  srvr += luck + '\n';

  // Traits if locked
  if (traitsNotes) srvr += `${traitsNotes}\n`;

  // Equipment items
  const equipment = player.equipment || [];
  if (equipment.length > 0) {
    srvr += `\nEquipment:\n`;
    equipment.forEach(item => { srvr += `  · ${item.name} (${item.type})\n`; });
  }

  // Server log entries (attr changes, coin spends)
  const log = player.srvLog || [];
  if (log.length > 0) {
    srvr += `\n`;
    log.forEach(entry => { srvr += `${entry}\n`; });
  }

  srvr += `-----memo-----`;

  // Host freetext below the separator
  const memoBody = player.memoBody || '';
  return srvr + memoBody;
}

function appendPlayerLog(slotIndex, message) {
  const player = gameState.players[slotIndex];
  if (!player) return;
  if (!player.srvLog) player.srvLog = [];
  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  player.srvLog.push(`[${ts}] ${message}`);
  saveState();
  // Refresh notepad if open for this player
  if (typeof currentPlayerIndex !== 'undefined' && currentPlayerIndex === slotIndex) {
    document.getElementById('playerNotepadText').value = buildPlayerNotes(slotIndex);
  }
}

// Returns the numeric coin total for display, regardless of storage format
function getCoinTotal(player) {
  if (!player) return 0;
  // If coinPurse exists, sum it
  if (player.coinPurse && typeof player.coinPurse === 'object') {
    return Object.values(player.coinPurse).reduce((s, v) => s + (Number(v) || 0), 0);
  }
  // Legacy: coins is already a number
  return typeof player.coins === 'number' ? player.coins : 0;
}


const RANDOM_COIN_TABLE = [
  { type: 'gold',   weight: 10 },
  { type: 'silver', weight: 35 },
  { type: 'alloy',  weight: 40 },
  { type: 'old',    weight: 15 },
];

function rollRandomCoin() {
  const total = RANDOM_COIN_TABLE.reduce((s, c) => s + c.weight, 0);
  let roll = Math.random() * total;
  for (const entry of RANDOM_COIN_TABLE) {
    roll -= entry.weight;
    if (roll <= 0) return entry.type;
  }
  return 'alloy'; // fallback
}

function giveRandomCoin(playerIndex) {
  const coinType = rollRandomCoin();
  const player = gameState.players[playerIndex];

  // Initialise coinPurse if missing
  if (!player.coinPurse) player.coinPurse = { gold:0, silver:0, alloy:0, old:0, mystery:0 };
  player.coinPurse[coinType] = (player.coinPurse[coinType] || 0) + 1;
  player.coins = (player.coins || 0) + 1; // keep legacy total in sync

  renderPlayers();
  saveState();
  pushCoinUpdateToFirebase(playerIndex);

  // Server log
  if (activeSessionCode) {
    const coinNames = { gold:'Gold', silver:'Silver', alloy:'Alloy', old:'Old Coin' };
    const playerName = gameState.players[playerIndex]?.name || `Player ${playerIndex + 1}`;
    db.ref(`sessions/${activeSessionCode}/log`).push({
      type: 'coinBestow',
      summary: `Host bestowed 1 ${coinNames[coinType]} to ${playerName}`,
      player: playerName,
      coins: { [coinType]: 1 },
      timestamp: Date.now()
    });
  }

  // Brief visual feedback — target the coins + button specifically
  const cards = document.querySelectorAll('.player-card');
  if (cards[playerIndex]) {
    const btn = cards[playerIndex].querySelector('.coin-plus-btn');
    if (btn) {
      btn.title = `+1 ${coinNames[coinType]}!`;
      btn.style.borderColor = '#FFD700';
      setTimeout(() => { btn.title = 'Give a random coin'; btn.style.borderColor = ''; }, 1500);
    }
  }
}

  const player = gameState.players[bestowTargetIndex];

  // Always initialise coinPurse with all keys before adding
  if (!player.coinPurse || typeof player.coinPurse !== 'object') {
    player.coinPurse = { gold:0, silver:0, alloy:0, old:0, mystery:0 };
  }
  BESTOW_COIN_KEYS.forEach(coin => {
    if (player.coinPurse[coin] === undefined) player.coinPurse[coin] = 0;
  });

  let totalGiven = 0;
  BESTOW_COIN_KEYS.forEach(coin => {
    const amt = bestowAmounts[coin] || 0;
    if (amt > 0) {
      player.coinPurse[coin] += amt;
      totalGiven += amt;
    }
  });

  if (typeof player.coins !== 'number') player.coins = 0;
  player.coins += totalGiven;

  const targetIndex = bestowTargetIndex; // capture before closing clears it
  closeBestowOverlay();
  renderPlayers();
  saveState();
  pushCoinUpdateToFirebase(targetIndex);

  // Server log
  if (activeSessionCode) {
    const coinNames = { gold:'Gold', silver:'Silver', alloy:'Alloy', old:'Old Coin', mystery:'Li' };
    const parts = BESTOW_COIN_KEYS
      .filter(c => (bestowAmounts[c] || 0) > 0)
      .map(c => `${bestowAmounts[c]} ${coinNames[c]}`);
    if (parts.length > 0) {
      const playerName = gameState.players[targetIndex]?.name || `Player ${targetIndex + 1}`;
      db.ref(`sessions/${activeSessionCode}/log`).push({
        type: 'coinBestow',
        summary: `Host bestowed ${parts.join(', ')} to ${playerName}`,
        player: playerName,
        coins: { ...bestowAmounts },
        timestamp: Date.now()
      });
    }
  }
} // end confirmBestow

function pushCoinUpdateToFirebase(playerIndex) {
  if (!activeSessionCode) return;
  const player = gameState.players[playerIndex];
  const slot = `player${playerIndex}`;
  const purse = player.coinPurse || { gold:0, silver:0, alloy:0, old:0, mystery:0 };
  db.ref(`sessions/${activeSessionCode}/players/${slot}/coins`).set(purse);
}

// Call this from updateStat() to push host life changes back to player page
function pushHostLifeUpdateToFirebase(playerIndex, newLife) {
  if (!activeSessionCode) return;
  const slot = `player${playerIndex}`;
  db.ref(`sessions/${activeSessionCode}/players/${slot}/currentLife`).set(newLife);
}


// Wire up bestow overlay buttons
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('bestowCancelBtn').addEventListener('click', closeBestowOverlay);
  document.getElementById('bestowConfirmBtn').addEventListener('click', confirmBestow);

  document.querySelectorAll('.bestow-adj-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      adjustBestowAmount(btn.dataset.coin, parseInt(btn.dataset.dir, 10));
    });
  });

  // Close on backdrop click
  document.getElementById('bestowOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('bestowOverlay')) closeBestowOverlay();
  });
});

</script>
