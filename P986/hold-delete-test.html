<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hold to Delete Button</title>

<style>

:root{
--size:120px;
--ring:8;
--danger:#ff2a2a;
--glow:0;
--scale:1;
}

body{
background:#111;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:sans-serif;
}

/* button container */

.delete-button{
position:relative;
width:var(--size);
height:var(--size);
cursor:pointer;

transform:scale(var(--scale));
transition:transform .15s ease;
}

/* circular halo glow */

.halo{

position:absolute;
top:50%;
left:50%;

width:140%;
height:140%;

transform:translate(-50%,-50%) scale(calc(1 + var(--glow) * 0.15));

border-radius:50%;

pointer-events:none;

background:radial-gradient(
circle,
rgba(255,215,0,0.75) 0%,
rgba(255,215,0,0.45) 35%,
rgba(255,215,0,0.2) 55%,
rgba(255,215,0,0) 70%
);

opacity: calc(var(--glow) * 0.5);

transition:
opacity .1s linear,
transform .1s linear;

}

/* SVG ring */

svg{
width:100%;
height:100%;
transform:rotate(-90deg);
}

/* base white ring */

.ring-white{
fill:none;
stroke:white;
stroke-width:var(--ring);
opacity:.9;
}

/* red progress ring */

.ring-progress{
fill:none;
stroke:var(--danger);
stroke-width:var(--ring);
stroke-linecap:round;
stroke-dasharray:314;
stroke-dashoffset:314;
}

/* icon container */

.icon{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;

color:var(--danger);
}

/* bigger X */

.icon svg{
width:52%;
height:52%;
}

</style>

</head>

<body>

<div class="delete-button" id="deleteButton">

<div class="halo"></div>

<svg viewBox="0 0 120 120">

<circle
class="ring-white"
cx="60"
cy="60"
r="50"
/>

<circle
class="ring-progress"
id="progressRing"
cx="60"
cy="60"
r="50"
/>

</svg>

<div class="icon">
<svg viewBox="0 0 24 24" fill="none">

<path
d="M17 7L7 17M7 7L17 17"
stroke="currentColor"
stroke-width="3"
stroke-linecap="round"
/>

</svg>
</div>

</div>

<script>

const button = document.getElementById("deleteButton")
const ring = document.getElementById("progressRing")

let holding = false
let startTime = 0

const holdDuration = 3000

function update(){

if(!holding) return

let elapsed = Date.now() - startTime
let progress = Math.min(elapsed / holdDuration, 1)

let offset = 314 * (1 - progress)
ring.style.strokeDashoffset = offset

button.style.setProperty("--glow", progress)
button.style.setProperty("--scale", 1 + (progress * 0.08))

if(progress < 1){

requestAnimationFrame(update)

}else{

holding = false

button.style.setProperty("--scale", 1.2)

setTimeout(()=>{
button.style.setProperty("--scale",1)
confirmDelete()
reset()
},150)

}

}

function reset(){

holding = false

ring.style.strokeDashoffset = 314
button.style.setProperty("--glow",0)
button.style.setProperty("--scale",1)

}

function confirmDelete(){

setTimeout(()=>{
if(confirm("Are you sure you want to delete this?")){
alert("Item deleted.")
}
},50)

}

/* PRESS START */

function startHold(){

holding = true
startTime = Date.now()
update()

}

/* PRESS CANCEL */

function cancelHold(){

if(!holding) return
reset()

}

/* mouse */

button.addEventListener("mousedown", startHold)
button.addEventListener("mouseup", cancelHold)
button.addEventListener("mouseleave", cancelHold)

/* touch */

button.addEventListener("touchstart", startHold)
button.addEventListener("touchend", cancelHold)
button.addEventListener("touchcancel", cancelHold)

</script>


</body>
</html>
