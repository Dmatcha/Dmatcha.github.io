<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ==========================
   CSS VARIABLES
========================== */
:root {
  --bg-primary: #0a0a0c;
  --bg-secondary: #141418;
  --bg-card: #1a1a1f;
  --bg-elevated: #222228;
  --text-primary: #e8eaf0;
  --text-secondary: #8b8d94;
  --text-muted: #5a5c63;
  --accent-primary: #8b5cf6;
  --accent-secondary: #a78bfa;
  --accent-danger: #ef4444;
  --accent-warning: #f59e0b;
  --accent-success: #10b981;
  --accent-info: #3b82f6;
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-medium: rgba(255, 255, 255, 0.1);
  --glass-bg: rgba(26, 26, 31, 0.7);
  --glass-border: rgba(255, 255, 255, 0.08);
  --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
  --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.3);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
}

/* ==========================
   RESET & BASE
========================== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  font-family: 'Crimson Pro', 'Georgia', serif;
  background: linear-gradient(165deg, #0c0c10 0%, #0f0f14 40%, #141418 100%);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* ==========================
   TYPOGRAPHY
========================== */
h1, h2, h3, h4 {
  font-weight: 600;
  letter-spacing: -0.02em;
}

.mono {
  font-family: 'JetBrains Mono', monospace;
}

/* ==========================
   LAYOUT CONTAINER
========================== */
.app-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 0.25rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  overflow-x: hidden;
}

/* ==========================
   HEADER SECTION
========================== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  padding: 0rem 1.5rem;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  box-shadow: var(--shadow-md);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.header-center {
  flex: 1;
  display: flex;
  justify-content: center;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.host-btn {
  appearance: none;
  border: 1px solid var(--border-medium);
  background: rgba(239, 68, 68, 0.1);
  color: var(--accent-danger);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  padding: 0.5rem 0.5rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.05em;
}

.host-btn:hover {
  background: rgba(239, 68, 68, 0.2);
  border-color: var(--accent-danger);
}

.villain-input {
  appearance: none;
  -webkit-appearance: none;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-medium);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  text-align: center;
  padding: 0.4rem 0.75rem;
  min-width: 180px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
}

.villain-input:focus {
  outline: none;
  border-color: var(--accent-primary);
  background: rgba(139, 92, 246, 0.1);
}

.villain-input option {
  background: var(--bg-card);
  color: var(--text-primary);
}

.act-btn {
  appearance: none;
  border: 1px solid var(--border-medium);
  background: rgba(139, 92, 246, 0.1);
  color: var(--accent-secondary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 0rem 1.25rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  width: 80px;
  flex-shrink: 0;
}

.act-btn:hover {
  background: rgba(139, 92, 246, 0.2);
  border-color: var(--accent-primary);
}

.book-btn {
  appearance: none;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  width: 2rem;
  height: 2rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.book-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-primary);
}

.book-btn svg {
  width: 2rem;
  height: 2rem;
}

/* ==========================
   MAIN CONTENT AREA
========================== */
.main-content {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  padding-top: 5rem;
  padding-bottom: 8rem;
}

/* ==========================
   PLAYERS GRID
========================== */
.players-grid {
  display: grid;
  gap: 1rem;
  min-width: 0;
  overflow-x: hidden;
}

/* Wide: 3 columns */
@media (min-width: 1024px) {
  .players-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

/* Half-wide: 2 columns */
@media (min-width: 760px) and (max-width: 1023px) {
  .players-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

/* Narrow: 1 column (default) */
@media (max-width: 759px) {
  .players-grid {
    grid-template-columns: minmax(0, 1fr);
  }
}

/* ==========================
   PLAYER CARD
========================== */
.player-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  box-shadow: var(--shadow-md);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  min-width: 0;
  overflow: hidden;
  position: relative;
}

.player-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

/* Delete Player Button */
.delete-btn {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  width: 28px;
  height: 28px;
  cursor: pointer;
  transform: scale(var(--scale, 1));
  transition: transform 0.15s ease;
  background: none;
  border: none;
  padding: 0;
}

.delete-btn .halo {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 140%;
  height: 140%;
  transform: translate(-50%, -50%) scale(calc(1 + var(--glow, 0) * 0.15));
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(
    circle,
    rgba(255, 42, 42, 0.75) 0%,
    rgba(255, 42, 42, 0.45) 35%,
    rgba(255, 42, 42, 0.2) 55%,
    rgba(255, 42, 42, 0) 70%
  );
  opacity: calc(var(--glow, 0) * 0.5);
  transition: opacity 0.1s linear, transform 0.1s linear;
}

.delete-btn svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.delete-btn .ring-white {
  fill: none;
  stroke: white;
  stroke-width: 6;
  opacity: 0.9;
}

.delete-btn .ring-progress {
  fill: none;
  stroke: var(--accent-danger);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 157;
  stroke-dashoffset: 157;
}

.delete-btn .icon {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent-danger);
}

.delete-btn .icon svg {
  width: 50%;
  height: 50%;
  transform: rotate(90deg);
}

.player-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
  gap: 0.75rem;
  min-width: 0;
}

.player-name-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  min-width: 0;
}

.player-right-section {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  align-items: flex-end;
  min-width: 0;
}

.player-card-header {
  display: flex;
  justify-content: flex-start;
  width: 100%;
}

.player-memobook-btn {
  appearance: none;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.75rem;
  padding: 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 2rem;
  height: 2rem;
}

.player-memobook-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-primary);
}

.player-name {
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--border-subtle);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  padding: 0.25rem 0;
  width: 100%;
  transition: border-color 0.2s ease;
}

.player-name:focus {
  outline: none;
  border-bottom-color: var(--accent-primary);
}

.player-name::placeholder {
  color: var(--text-muted);
}

.player-tags {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  min-width: 0;
}

.artefact-select,
.iris-select {
  width: 100%;
  min-width: 0;
  max-width: 100%;
}

.tag-select {
  appearance: none;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.75rem;
  padding: 0.25rem 0.5rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  min-width: 0;
  max-width: 100%;
}

.tag-select:focus {
  outline: none;
  border-color: var(--accent-primary);
}

.status-checkboxes {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.4rem;
  min-width: 0;
}

.status-checkbox {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text-secondary);
  transition: color 0.2s ease;
}

.status-checkbox:hover {
  color: var(--text-primary);
}

.status-checkbox:has(input:checked) {
  color: #ffffff;
  text-decoration: underline;
}

.status-checkbox input {
  appearance: none;
  width: 16px;
  height: 16px;
  border: 1px solid var(--border-medium);
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.02);
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
}

.status-checkbox input:checked {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
}

.status-checkbox input:checked::after {
  content: '✓';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 10px;
  font-weight: bold;
}

/* ==========================
   STATS SECTION
========================== */
.stats-section {
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border-subtle);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem 0.5rem;
  min-width: 0;
  overflow: hidden;
}

.stat-row {
  display: flex;
  align-items: center;
  min-width: 0;
}

.stat-row:last-child {
  margin-bottom: 0;
}

.stat-label {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-weight: 500;
  min-width: 65px;
  text-align: right;
  margin-right: 1rem;
}

.stat-label.madness-clickable {
  cursor: pointer;
  transition: color 0.2s ease;
}

.stat-label.madness-clickable:hover {
  color: var(--accent-danger);
}

.stat-label.madness-clickable {
  font-weight: bold;
  text-decoration: underline;
}

.stat-label.madness-clickable:hover {
  color: var(--accent-danger);
}

.stat-controls {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  min-width: 0;
}

.stat-btn {
  appearance: none;
  border: 1px solid var(--border-medium);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-secondary);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 500;
  transition: all 0.15s ease;
}

.stat-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
}

.stat-btn.minus {
  border-radius: 50%;
}

.stat-btn.plus {
  border-radius: 8px;
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  font-weight: 500;
  min-width: 32px;
  text-align: center;
  color: var(--text-primary);
}

.stat-value.madness {
  color: #DC143C;
}

.stat-value.life {
  color: #228B22;
}

.stat-value.soul {
  color: #800080;
}

.stat-value.coins {
  color: #FFD700;
}

/* ==========================
   ADD PLAYER BUTTON
========================== */
.add-player-btn {
  appearance: none;
  border: 2px dashed var(--border-medium);
  background: transparent;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.9rem;
  padding: 1rem;
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.add-player-btn:hover {
  border-color: var(--accent-primary);
  color: var(--accent-primary);
  background: rgba(139, 92, 246, 0.05);
}

/* ==========================
   DICE TRAY SECTION
========================== */
.dice-tray {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 0rem 0.25rem;
  box-shadow: var(--shadow-md);
}

.dice-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.1rem;
}

.results-display {
  flex: 1;
  text-align: left;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: var(--accent-success);
  height: 2rem;
  overflow: hidden;
  white-space: nowrap;
  padding: 0.1rem 1rem;
  display: flex;
  align-items: center;
}

.results-display:empty::before {
  content: '{ results }';
  color: var(--text-muted);
}

.clear-btn {
  appearance: none;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.8rem;
  cursor: pointer;
  padding: 0.25rem 0.5rem;
  border-radius: var(--radius-sm);
  transition: all 0.2s ease;
}

.clear-btn:hover {
  color: var(--accent-danger);
  background: rgba(239, 68, 68, 0.1);
}

.dice-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  padding-bottom: 0.25rem;
}

.dice-btn {
  appearance: none;
  border: 1px solid var(--border-medium);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  font-weight: 500;
  padding: 0.6rem 1rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s ease;
}

.dice-btn:hover {
  background: rgba(139, 92, 246, 0.15);
  border-color: var(--accent-primary);
  transform: translateY(-1px);
}

.dice-btn:active {
  transform: translateY(0);
}

.coin-btn {
  background: rgba(251, 191, 36, 0.1);
  border-color: rgba(251, 191, 36, 0.3);
  color: var(--accent-warning);
}

.coin-btn:hover {
  background: rgba(251, 191, 36, 0.2);
  border-color: var(--accent-warning);
}

.enemy-btn {
  margin-left: auto;
  background: rgba(239, 68, 68, 0.1);
  border-color: rgba(239, 68, 68, 0.3);
  color: var(--accent-danger);
  padding: 0.6rem 1.5rem;
}

.enemy-btn:hover {
  background: rgba(239, 68, 68, 0.2);
  border-color: var(--accent-danger);
}

.enemy-btn.open {
  background: var(--accent-info);
  border-color: var(--accent-info);
  color: white;
}

/* ==========================
   ENEMY SECTION
========================== */
.enemy-section {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  box-shadow: var(--shadow-md);
  display: none;
}

.enemy-section.visible {
  display: block;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.enemy-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border-subtle);
}

.enemy-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--accent-danger);
}

.enemy-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
}

.enemy-stat {
  background: rgba(0, 0, 0, 0.2);
  padding: 1rem;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-subtle);
}

.enemy-stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.enemy-stat-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.enemy-stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.25rem;
  font-weight: 600;
  min-width: 40px;
  text-align: center;
}

/* ==========================
   MADNESS OVERLAY
========================== */
.madness-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 2rem;
}

.madness-overlay.visible {
  display: flex;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.madness-content {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: 2rem;
  max-width: 800px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  position: relative;
}

.madness-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  appearance: none;
  border: none;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-secondary);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.25rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.madness-close:hover {
  background: rgba(239, 68, 68, 0.2);
  color: var(--accent-danger);
}

.madness-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent-danger);
  margin-bottom: 1.5rem;
  text-align: center;
}

.madness-text {
  font-size: 1.1rem;
  line-height: 1.8;
  color: var(--text-primary);
}

.madness-text .player-ref {
  color: var(--accent-secondary);
  font-weight: 600;
}

.madness-text .stat-highlight {
  color: var(--accent-warning);
  font-weight: 600;
}

/* ==========================
   NOTEPAD OVERLAY
========================== */
.notepad-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 2rem;
}

.notepad-overlay.visible {
  display: flex;
  animation: fadeIn 0.3s ease;
}

.notepad-content {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: 2rem;
  width: 90vw;
  height: 80vh;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  position: relative;
}

.notepad-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  appearance: none;
  border: none;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-secondary);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.25rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.notepad-close:hover {
  background: rgba(239, 68, 68, 0.2);
  color: var(--accent-danger);
}

.notepad-title {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 1rem;
  color: var(--text-primary);
}

.notepad-textarea {
  width: 100%;
  flex: 1;
  min-height: 200px;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 1rem;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  line-height: 1.6;
  resize: vertical;
  transition: border-color 0.2s ease;
}

.notepad-textarea:focus {
  outline: none;
  border-color: var(--accent-primary);
}

.notepad-textarea::placeholder {
  color: var(--text-muted);
}

/* ==========================
   RESPONSIVE ADJUSTMENTS
========================== */
@media (max-width: 759px) {
  .app-container {
    padding: 0 0.5rem;
    gap: 1rem;
    overflow-x: hidden;
  }
  
  .header {
    gap: 0.5rem;
    padding: 0.1rem 0.75rem;
  }
  
  .header-left {
    gap: 0.5rem;
  }
  
  .header-right {
    gap: 0.5rem;
  }
  
  .player-card {
    padding: 1rem;
  }
  
  .dice-buttons {
    justify-content: center;
  }
  
  .enemy-stats {
    grid-template-columns: 1fr;
  }
}

/* ==========================
   UTILITY CLASSES
========================== */
.hidden {
  display: none !important;
}

.text-danger {
  color: var(--accent-danger);
}

.text-warning {
  color: var(--accent-warning);
}

.text-success {
  color: var(--accent-success);
}

.text-info {
  color: var(--accent-info);
}
</style>
</head>

<script>
// ==========================
// STATE MANAGEMENT
// ==========================
let gameState = {
  villain: '',
  act: 0,
  players: [],
  enemy: {
    name: 'Enemy',
    life: 10,
    stress: 0,
    damage: 0
  },
  enemyVisible: false,
  diceResults: []
};

const actStages = ['0', 'I', 'II', 'III', 'Finale'];

// ==========================
// INITIALIZATION
// ==========================
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  renderPlayers();
  setupDeleteButtons();
  renderEnemy();
  updateActButton();
  
  // Set up notepad
  document.getElementById('notepadText').value = gameState.notepad || '';
});

// ==========================
// PLAYER MANAGEMENT
// ==========================
function createPlayer(id) {
  return {
    id: id,
    name: '',
    artefact: '',
    iris: '',
    favour: false,
    dread: false,
    blessed: false,
    curse: false,
    madness: 0,
    life: 1,
    soul: 0,
    coins: 0,
    previousMadness: 0,
    notes: ''
  };
}

function renderPlayers() {
  const grid = document.getElementById('playersGrid');
  grid.innerHTML = '';
  
  gameState.players.forEach((player, index) => {
    const card = document.createElement('div');
    card.className = 'player-card';
    card.innerHTML = `
      <button class="delete-btn" id="deleteBtn${index}" data-player-index="${index}" title="Delete Player">
        <div class="halo"></div>
        <svg viewBox="0 0 60 60">
          <circle class="ring-white" cx="30" cy="30" r="25"/>
          <circle class="ring-progress" id="progressRing${index}" cx="30" cy="30" r="25"/>
        </svg>
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M17 7L7 17M7 7L17 17" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
      </button>
      <div class="player-header">
        <div class="player-name-section">
          <input type="text" class="player-name" value="${player.name}" 
            placeholder="Player ${index + 1} Name" 
            onchange="updatePlayer(${index}, 'name', this.value)">
          <select class="tag-select artefact-select" onchange="updatePlayer(${index}, 'artefact', this.value)">
            <option value="">Choose artefact</option>
            <option value="The Darkflame" ${player.artefact === 'The Darkflame' ? 'selected' : ''}>The Darkflame</option>
            <option value="The Wintergrace" ${player.artefact === 'The Wintergrace' ? 'selected' : ''}>The Wintergrace</option>
            <option value="The Bronze Ring of Smiles" ${player.artefact === 'The Bronze Ring of Smiles' ? 'selected' : ''}>The Bronze Ring of Smiles</option>
            <option value="The Wand" ${player.artefact === 'The Wand' ? 'selected' : ''}>The Wand</option>
            <option value="The Pair and a Half" ${player.artefact === 'The Pair and a Half' ? 'selected' : ''}>The Pair and a Half</option>
            <option value="The Trickblade" ${player.artefact === 'The Trickblade' ? 'selected' : ''}>The Trickblade</option>
            <option value="The Fisherman's Flask" ${player.artefact === "The Fisherman's Flask" ? 'selected' : ''}>The Fisherman's Flask</option>
            <option value="Scathe's Memo Book" ${player.artefact === "Scathe's Memo Book" ? 'selected' : ''}>Scathe's Memo Book</option>
            <option value="The Prismatic Glasses" ${player.artefact === 'The Prismatic Glasses' ? 'selected' : ''}>The Prismatic Glasses</option>

// Hold-to-delete functionality
const deleteState = {};

function setupDeleteButtons() {
  document.querySelectorAll('.delete-btn').forEach(btn => {
    btn.onmousedown = null;
    btn.onmouseup = null;
    btn.onmouseleave = null;
    btn.ontouchstart = null;
    btn.ontouchend = null;
    btn.ontouchcancel = null;
    
    const index = btn.dataset.playerIndex;
    
    btn.onmousedown = () => startHold(btn, index);
    btn.onmouseup = () => cancelHold(btn);
    btn.onmouseleave = () => cancelHold(btn);
    btn.ontouchstart = (e) => { e.preventDefault(); startHold(btn, index); };
    btn.ontouchend = () => cancelHold(btn);
    btn.ontouchcancel = () => cancelHold(btn);
  });
}

function startHold(btn, index) {
  const ring = document.getElementById(`progressRing${index}`);
  if (!ring) return;
  
  deleteState[index] = {
    holding: true,
    startTime: Date.now(),
    btn: btn,
    ring: ring
  };
  
  updateDelete(index);
}

function updateDelete(index) {
  const state = deleteState[index];
  if (!state || !state.holding) return;
  
  const elapsed = Date.now() - state.startTime;
  const progress = Math.min(elapsed / 3000, 1);
  
  const circumference = 2 * Math.PI * 25;
  const offset = circumference * (1 - progress);
  state.ring.style.strokeDashoffset = offset;
  
  state.btn.style.setProperty('--glow', progress);
  state.btn.style.setProperty('--scale', 1 + (progress * 0.08));
  
  if (progress < 1) {
    requestAnimationFrame(() => updateDelete(index));
  } else {
    state.holding = false;
    state.btn.style.setProperty('--scale', 1.2);
    
    setTimeout(() => {
      state.btn.style.setProperty('--scale', 1);
      confirmDelete(state.btn);
      resetDelete(index);
    }, 150);
  }
}

function cancelHold(btn) {
  const index = btn.dataset.playerIndex;
  if (deleteState[index] && deleteState[index].holding) {
    resetDelete(index);
  }
}

function resetDelete(index) {
  const state = deleteState[index];
  if (!state) return;
  
  state.holding = false;
  
  const ring = document.getElementById(`progressRing${index}`);
  if (ring) {
    ring.style.strokeDashoffset = 2 * Math.PI * 25;
  }
  state.btn.style.setProperty('--glow', 0);
  state.btn.style.setProperty('--scale', 1);
  
  delete deleteState[index];
}

function confirmDelete(btn) {
  const index = btn.dataset.playerIndex;
  const playerName = gameState.players[index]?.name || 'Player ' + (parseInt(index) + 1);
  
  setTimeout(() => {
    if (confirm(`Are you sure you want to delete ${playerName}?`)) {
      gameState.players.splice(parseInt(index), 1);
      renderPlayers();
      setupDeleteButtons();
      saveState();
    }
  }, 50);
}

function updatePlayer(index, field, value) {

function updateStat(index, stat, delta) {
  gameState.players[index][stat] += delta;
  if (gameState.players[index][stat] < 0) {
    gameState.players[index][stat] = 0;
  }
  
  // Track madness changes for the report
  if (stat === 'madness') {
    gameState.players[index].previousMadness = gameState.players[index].madness - delta;
  }
  
  renderPlayers();
  saveState();
}

// ==========================
// DICE ROLLING
// ==========================
function rollDice(count, sides) {
  let total = 0;
  let rolls = [];
  
  for (let i = 0; i < count; i++) {
    const roll = Math.floor(Math.random() * sides) + 1;
    rolls.push(roll);
    total += roll;
  }
  
  const notation = count === 1 ? `1d${sides}` : `${count}d${sides}`;
  const resultText = rolls.length > 1 
    ? `${notation}: [${rolls.join(', ')}] = ${total}`
    : `${notation}: ${total}`;
  
  addDiceResult(resultText);
}

function flipCoin() {
  const result = Math.random() < 0.5 ? 'HEADS' : 'TAILS';
  addDiceResult(`${result}`);
}

function addDiceResult(text) {
  // User-provided color pool (websafe, legible on dark background)
  const colorPool = [
    '#00FF00', '#FFFF00', '#00FFFF', 
    '#FFA500', '#FFC0CB', '#40E0D0',
    '#F5DEB3', '#FF6347', '#46F6F6', '#FA8072',
    '#8FBC8F', '#B0C4DE', '#FF7F50', '#6495ED',
    '#FFD700', '#FF4500', '#ADFF2F', '#FF69B4'
  ];
  
  // Get colors already used in current results
  const usedColors = gameState.diceResults.map(r => r.color);
  
  // Find available colors (not currently displayed)
  const availableColors = colorPool.filter(c => !usedColors.includes(c));
  
  // Pick from available colors, or from full pool if all are used
  let selectionPool = availableColors.length > 0 ? availableColors : colorPool;
  const randomColor = selectionPool[Math.floor(Math.random() * selectionPool.length)];
  
  // Store result with its color
  gameState.diceResults.push({ text: text, color: randomColor });
  
  // Keep only the last 6 results
  if (gameState.diceResults.length > 6) {
    gameState.diceResults.shift();
  }
  
  renderDiceResults();
  saveState();
}

function renderDiceResults() {
  const display = document.getElementById('resultsDisplay');
  
  const html = gameState.diceResults.map((result) => {
    return `<span style="color: ${result.color}; margin-right: 0.5rem;">${result.text}</span>`;
  }).join('');
  
  display.innerHTML = html;
}

function clearResults() {
  gameState.diceResults = [];
  renderDiceResults();
  saveState();
}

// ==========================
// MADNESS REPORT
// ==========================
function showMadnessReport(playerIndex) {
  const player = gameState.players[playerIndex];
  const otherPlayers = gameState.players.filter((p, i) => i !== playerIndex);
  
  // Find players with most and least madness
  const madnessValues = gameState.players.map(p => p.madness);
  const maxMadness = Math.max(...madnessValues);
  const minMadness = Math.min(...madnessValues.filter(m => m > 0));
  
  const hasMost = player.madness === maxMadness;
  const hasLeast = player.madness === minMadness || (minMadness === Infinity && player.madness === 0);
  const madnessIncreased = player.madness > player.previousMadness;
  const madnessDecreased = player.madness < player.previousMadness;
  const lifeLow = player.life <= Math.floor(player.life / 2);
  
  // Find target player (most innocent looking - lowest madness)
  let targetPlayer = otherPlayers.find(p => p.madness === minMadness) || otherPlayers[0];
  
  // Generate madness text
  let madnessText = generateMadnessText({
    player,
    targetPlayer,
    hasMost,
    hasLeast,
    madnessIncreased,
    madnessDecreased,
    lifeLow,
    otherPlayers
  });
  
  document.getElementById('madnessText').innerHTML = madnessText;
  document.getElementById('madnessOverlay').classList.add('visible');
}

function generateMadnessText(params) {
  const { player, targetPlayer, hasMost, hasLeast, madnessIncreased, madnessDecreased, lifeLow, otherPlayers } = params;
  
  const templates = [];
  
  if (hasMost && madnessIncreased) {
    templates.push(`The sweat on your neck is chilling, slithering against your boiling skin. You look to <span class="player-ref">${targetPlayer.name}</span>, so innocent, so obnoxious, so rotten. They act high and mighty, better than you... Immediately destroy one non-legendary item from <span class="player-ref">${targetPlayer.name}</span>'s inventory. Anyone caught in the altercation loses 1 coin.`);
  }
  
  if (hasMost && !madnessDecreased) {
    templates.push(`Your mind fractures as the weight of your sanity becomes unbearable. The voices scream for release. Point at <span class="player-ref">${targetPlayer.name}</span> and accuse them of treachery. They must defend their innocence or lose 1 <span class="stat-highlight">Soul</span>.`);
  }
  
  if (lifeLow && player.madness > 2) {
    templates.push(`The line between reality and nightmare blurs. You see things that aren't there—shadows that move, faces in the dark. You must spend 1 <span class="stat-highlight">Coin</span> or lose 1 <span class="stat-highlight">Soul</span> to calm your racing thoughts.`);
  }
  
  if (hasLeast && otherPlayers.length > 0) {
    templates.push(`Despite the chaos around you, you feel a strange clarity. The madness has not touched you... yet. You may give 1 <span class="stat-highlight">Coin</span> to <span class="player-ref">${targetPlayer.name}</span> or take 1 from anyone with more Madness than you.`);
  }
  
  if (madnessDecreased && player.madness > 0) {
    templates.push(`The fog in your mind lifts slightly, but the darkness remains. You glimpse the truth behind the veil. Record one secret in your notes. If you refuse, lose 1 <span class="stat-highlight">Coin</span>.`);
  }
  
  if (player.madness >= 5) {
    templates.push(`The ancient horror within you stirs. You cannot contain it much longer. Either sacrifice 2 <span class="stat-highlight">Coins</span> to appease the void, or all players must make a <span class="stat-highlight">Life</span> check (roll 1d6, lose 1 Life on 4+).`);
  }
  
  if (templates.length === 0) {
    templates.push(`Your thoughts scatter like dead leaves in a storm. The world feels unreal, distant. You hear whispers that no one else can hear. Take a moment to collect yourself... or surrender to the madness.`);
  }
  
  // Return a random template or combine a few
  return templates[Math.floor(Math.random() * templates.length)];
}

// ==========================
// STATE PERSISTENCE
// ==========================
function saveState() {
  gameState.villain = document.getElementById('villainName').value;
  localStorage.setItem('hostTrackerState', JSON.stringify(gameState));
}

function loadState() {
  const saved = localStorage.getItem('hostTrackerState');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      gameState = { ...gameState, ...parsed };
      
      // Ensure enemy object exists with all properties
      if (!gameState.enemy) {
        gameState.enemy = { name: 'Enemy', life: 10, stress: 0, damage: 0 };
      }
      
      document.getElementById('villainName').value = gameState.villain || '';
      
      // Restore enemy visibility
      if (gameState.enemyVisible) {
        document.getElementById('enemyBtn').classList.add('open');
        document.getElementById('enemySection').classList.add('visible');
      }
      
      // Restore dice results
      renderDiceResults();
    } catch (e) {
      console.error('Failed to load state:', e);
      // Initialize with default players if loading fails
      gameState.players = [
        createPlayer(1),
        createPlayer(2),
        createPlayer(3)
      ];
    }
  } else {
    // Default state with 3 players
    gameState.players = [
      createPlayer(1),
      createPlayer(2),
      createPlayer(3)
    ];
  }
}

function resetAll() {
  if (confirm('Are you sure you want to reset all game state? This cannot be undone.')) {
    localStorage.removeItem('hostTrackerState');
    gameState = {
      villain: '',
      act: 0,
      players: [
        createPlayer(1),
        createPlayer(2),
        createPlayer(3)
      ],
      enemy: {
        name: 'Enemy',
        life: 10,
        stress: 0,
        damage: 0
      },
      enemyVisible: false,
      diceResults: [],
      notepad: ''
    };
    
    document.getElementById('villainName').value = '';
    document.getElementById('notepadText').value = '';
    document.getElementById('enemyBtn').classList.remove('open');
    document.getElementById('enemySection').classList.remove('visible');
    
    renderPlayers();
    renderEnemy();
    updateActButton();
    renderDiceResults();
    saveState();
  }
}
